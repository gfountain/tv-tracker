<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marquee — TV Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0D0D0F;
      --bg2: #141418;
      --bg3: #1C1C22;
      --bg4: #242430;
      --border: rgba(255,255,255,0.07);
      --amber: #F5A623;
      --amber-dim: rgba(245,166,35,0.15);
      --amber-glow: rgba(245,166,35,0.3);
      --text: #F0EEE8;
      --text-muted: #7A7880;
      --text-mid: #B0ADBA;
      --green: #4CAF82;
      --red: #E05252;
      --blue: #5B9BD5;
      --radius: 10px;
      --radius-lg: 16px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

    /* SETUP SCREEN */
    #setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 2rem;
    }
    .setup-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      max-width: 540px;
      width: 100%;
    }
    .setup-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      color: var(--amber);
      margin-bottom: 0.25rem;
    }
    .setup-tagline {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .setup-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }
    .setup-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.7rem 1rem;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .setup-input:focus { outline: none; border-color: var(--amber); }
    .setup-help {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: -0.5rem;
      margin-bottom: 1rem;
    }
    .setup-help a { color: var(--amber); text-decoration: none; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.25rem;
      border-radius: var(--radius);
      border: none;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--amber);
      color: #0D0D0F;
      width: 100%;
      justify-content: center;
      padding: 0.8rem;
    }
    .btn-primary:hover { background: #FFB733; }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--amber); color: var(--amber); }
    .btn-icon {
      background: var(--bg3);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 0.5rem 0.7rem;
    }
    .btn-icon:hover { border-color: var(--amber); color: var(--amber); }

    /* APP LAYOUT */
    #app { display: none; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 58px;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--amber);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .topbar-search {
      flex: 1;
      max-width: 480px;
      position: relative;
    }
    .topbar-search input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem 0.5rem 2.4rem;
      border-radius: 50px;
      font-family: inherit;
      font-size: 0.88rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .topbar-search input:focus { outline: none; border-color: var(--amber); background: var(--bg2); }
    .topbar-search .search-icon {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      pointer-events: none;
    }
    .topbar-tabs {
      display: flex;
      gap: 0.25rem;
      margin-left: auto;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.4rem 0.9rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { background: var(--amber-dim); color: var(--amber); }
    .alert-tab-wrap { position: relative; display: inline-flex; }
    .alert-dot {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      display: none;
    }
    .alert-dot.show { display: block; animation: alertFlash 1.4s ease-in-out infinite; }
    @keyframes alertFlash {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(224,82,82,0.6); }
      50% { opacity: 0.6; transform: scale(1.25); box-shadow: 0 0 0 4px rgba(224,82,82,0); }
    }

    /* SEARCH DROPDOWN */
    .search-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      z-index: 200;
      max-height: 480px;
      overflow-y: auto;
      display: none;
    }
    .search-dropdown.open { display: block; }
    .search-result-item {
      display: flex;
      gap: 0.9rem;
      align-items: center;
      padding: 0.8rem 1rem;
      cursor: pointer;
      transition: background 0.1s;
    }
    .search-result-item:hover { background: var(--bg3); }
    .search-result-item + .search-result-item { border-top: 1px solid var(--border); }
    .search-poster-thumb {
      width: 42px;
      height: 62px;
      border-radius: 5px;
      object-fit: cover;
      background: var(--bg4);
      flex-shrink: 0;
    }
    .search-result-info { flex: 1; min-width: 0; }
    .search-result-title {
      font-weight: 600;
      font-size: 0.92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .search-result-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }
    .search-result-add {
      flex-shrink: 0;
      background: var(--amber-dim);
      color: var(--amber);
      border: 1px solid var(--amber-glow);
      border-radius: 50px;
      padding: 0.3rem 0.75rem;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .search-result-add:hover { background: var(--amber); color: #0D0D0F; }
    .search-result-add.tracked { background: var(--bg3); color: var(--text-muted); border-color: var(--border); cursor: default; }
    .search-loading, .search-empty {
      padding: 1.5rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    /* MAIN CONTENT */
    .main-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--text);
    }
    .section-count {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--bg3);
      padding: 0.2rem 0.6rem;
      border-radius: 50px;
      margin-left: 0.6rem;
    }

    /* FILTERS BAR */
    .filters-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .filter-chip {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.35rem 0.85rem;
      border-radius: 50px;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-chip:hover { border-color: var(--amber); color: var(--text); }
    .filter-chip.active { background: var(--amber-dim); border-color: var(--amber-glow); color: var(--amber); }

    /* SHOW GRID */
    .shows-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }
    .show-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .show-card:hover {
      transform: translateY(-3px);
      border-color: rgba(245,166,35,0.3);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .show-card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--bg4);
    }
    .show-card-poster-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--bg4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 2.5rem;
    }
    .show-card-body { padding: 0.85rem; }
    .show-card-title {
      font-weight: 600;
      font-size: 0.88rem;
      line-height: 1.3;
      margin-bottom: 0.3rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .show-card-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.18rem 0.55rem;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-returning { background: rgba(76,175,130,0.15); color: var(--green); }
    .badge-ended { background: rgba(122,120,128,0.15); color: var(--text-muted); }
    .badge-cancelled { background: rgba(224,82,82,0.15); color: var(--red); }
    .badge-upcoming { background: rgba(91,155,213,0.15); color: var(--blue); }
    .badge-in-production { background: rgba(245,166,35,0.15); color: var(--amber); }
    .progress-bar-wrap {
      height: 3px;
      background: var(--bg4);
      border-radius: 2px;
      margin-top: 0.6rem;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--amber);
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .card-watched-overlay {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(76,175,130,0.9);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
    }
    .card-alert-badge {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      background: rgba(245,166,35,0.9);
      color: #0D0D0F;
      border-radius: 50px;
      padding: 0.15rem 0.45rem;
      font-size: 0.7rem;
      font-weight: 700;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state h3 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text); margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.9rem; max-width: 300px; margin: 0 auto; }

    /* DETAIL PANEL */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 300;
      display: none;
      align-items: flex-start;
      justify-content: flex-end;
    }
    .detail-overlay.open { display: flex; }
    .detail-panel {
      background: var(--bg2);
      width: min(700px, 100vw);
      height: 100vh;
      overflow-y: auto;
      border-left: 1px solid var(--border);
      box-shadow: -20px 0 60px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
    }
    .detail-backdrop {
      position: relative;
      width: 100%;
      height: 280px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .detail-backdrop img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }
    .detail-backdrop::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(13,13,15,0) 30%, var(--bg2) 100%);
    }
    .detail-backdrop-placeholder {
      width: 100%;
      height: 100%;
      background: var(--bg4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }
    .detail-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      background: rgba(13,13,15,0.7);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      backdrop-filter: blur(6px);
    }
    .detail-close:hover { background: var(--bg3); }
    .detail-body { padding: 0 1.5rem 2rem; flex: 1; }
    .detail-header { display: flex; gap: 1.25rem; align-items: flex-start; margin-bottom: 1.25rem; }
    .detail-poster {
      width: 100px;
      border-radius: var(--radius);
      flex-shrink: 0;
      margin-top: -50px;
      position: relative;
      z-index: 5;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .detail-poster-placeholder {
      width: 100px;
      height: 150px;
      background: var(--bg4);
      border-radius: var(--radius);
      flex-shrink: 0;
      margin-top: -50px;
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .detail-info { flex: 1; min-width: 0; padding-top: 0.5rem; }
    .detail-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }
    .detail-meta-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    .detail-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .detail-overview {
      font-size: 0.88rem;
      color: var(--text-mid);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    /* STREAMING */
    .streaming-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .streaming-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.3rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-mid);
    }
    .streaming-badge img {
      width: 18px;
      height: 18px;
      border-radius: 4px;
    }

    /* NEXT EPISODE ALERT */
    .alert-box {
      background: var(--amber-dim);
      border: 1px solid var(--amber-glow);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
    }
    .alert-box .alert-icon { font-size: 1.1rem; flex-shrink: 0; }
    .alert-box strong { color: var(--amber); }

    /* SEASONS */
    .seasons-section { margin-bottom: 1.5rem; }
    .seasons-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .seasons-label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .season-accordion {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 0.6rem;
    }
    .season-head {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1rem;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .season-head:hover { background: var(--bg3); }
    .season-chevron {
      color: var(--text-muted);
      font-size: 0.85rem;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .season-accordion.open .season-chevron { transform: rotate(90deg); }
    .season-name { font-weight: 600; font-size: 0.9rem; flex: 1; }
    .season-progress-text { font-size: 0.78rem; color: var(--text-muted); }
    .season-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .season-check.done { background: var(--green); border-color: var(--green); }
    .season-check.partial { border-color: var(--amber); }
    .season-mini-progress {
      width: 60px;
      height: 3px;
      background: var(--bg4);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .season-mini-fill {
      height: 100%;
      background: var(--amber);
      border-radius: 2px;
      transition: width 0.3s;
    }
    .season-mini-fill.done { background: var(--green); }
    .season-episodes {
      display: none;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .season-accordion.open .season-episodes { display: block; }
    .episode-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.1s;
      cursor: pointer;
    }
    .episode-row:last-child { border-bottom: none; }
    .episode-row:hover { background: rgba(255,255,255,0.02); }
    .ep-check {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: transparent;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .ep-check.watched {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .ep-num {
      font-size: 0.72rem;
      color: var(--text-muted);
      width: 1.8rem;
      flex-shrink: 0;
      text-align: right;
    }
    .ep-name {
      font-size: 0.84rem;
      flex: 1;
      color: var(--text-mid);
    }
    .ep-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .ep-row-future { opacity: 0.45; cursor: default; }
    .mark-season-btn {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
    }
    .mark-season-btn:hover { color: var(--amber); }

    /* SUGGESTIONS */
    .suggestions-row {
      display: flex;
      gap: 0.75rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      scrollbar-width: thin;
    }
    .suggestion-card {
      flex-shrink: 0;
      width: 110px;

<script>
// ─── CONFIG & STATE ───────────────────────────────────────────────────────────
// Hard-coded project config. The Supabase anon key is safe to expose publicly —
// it has no power on its own; Row Level Security policies (set up in
// supabase-setup.sql) are what actually restrict each user to their own data.
// The TMDB token is a free, read-only API key with no write/billing risk.
const SUPABASE_URL = 'https://batnmsaoqlwqwofvccol.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhdG5tc2FvcWx3cXdvZnZjY29sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDU1NDMsImV4cCI6MjA5NzIyMTU0M30.vzHazXUkqQyCE77wu3WnCwuPPoZJTGkfh5z4ZZfrkco';
const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJjNDFhZjBiOGRlZjAzMWJhMjdhYzljZjY5NGNkMGY3YiIsIm5iZiI6MTYzNjkwMjA3NC42ODcsInN1YiI6IjYxOTEyNGJhZGJmMTQ0MDA0NTAzNWY5YSIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.brdukRxNiir-rvvRw1wurq_rzTVB1N6m20HOWMY3uKo';

let db = null;
let currentUser = null;
let authMode = 'signin'; // 'signin' | 'signup'
let currentTab = 'watching';
let currentView = 'grid'; // 'grid' | 'list'
let trackedShows = []; // local cache [{...supabase row, tmdb:{...}}]
let activeAlerts = []; // local cache of undismissed alerts from the alerts table
let activeDetailId = null;
let searchDebounce = null;
let openSeasonIds = new Set(); // tracks which season accordions are open, survives re-renders
let hideWatchedSeasonsMap = {}; // { [showId]: boolean } whether to hide fully-watched seasons
let calendarMonth = new Date().getMonth();
let calendarYear = new Date().getFullYear();
let calendarEpisodeCache = {}; // { 'YYYY-MM': [{date, showId, showName, poster, season, episode, name}] }
let watchingSubView = 'all'; // 'all' | 'unwatched'
let showProgressCache = {}; // { [showId]: { watched, total, pct } } — aggregate progress across all aired episodes

const TMDB_BASE = 'https://api.themoviedb.org/3';
const TMDB_IMG = 'https://image.tmdb.org/t/p';

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Restore session if one exists (Supabase persists it in localStorage automatically)
  const { data: { session } } = await db.auth.getSession();
  if (session?.user) {
    await onAuthSuccess(session.user);
  }

  // Keep app state in sync if the session changes (e.g. token refresh, sign out elsewhere,
  // or completing a magic-link sign-in via redirect)
  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT') {
      currentUser = null;
      document.getElementById('app').style.display = 'none';
      document.getElementById('setup-screen').style.display = 'flex';
    } else if (event === 'SIGNED_IN' && session?.user && !currentUser) {
      await onAuthSuccess(session.user);
    }
  });

  // Enter key submits the auth form from either field
  document.getElementById('auth-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAuthSubmit();
  });
  document.getElementById('auth-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAuthSubmit();
  });
});

async function onAuthSuccess(user) {
  currentUser = user;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const emailDisplay = document.getElementById('user-email-display');
  if (emailDisplay) { emailDisplay.textContent = user.email; emailDisplay.style.display = 'inline'; }

  setupSearch();
  await loadAllShows();
  await refreshShowProgressCache();
  await detectAndStoreAlerts();
  await loadActiveAlerts();
  renderTab();
  updateAlertBell();
}

// ─── AUTH UI ──────────────────────────────────────────────────────────────────
function setAuthMode(mode) {
  authMode = mode;
  document.getElementById('auth-tab-signin').classList.toggle('active', mode === 'signin');
  document.getElementById('auth-tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('auth-submit-btn').textContent = mode === 'signin' ? 'Sign In →' : 'Create Account →';
  document.getElementById('auth-password').autocomplete = mode === 'signin' ? 'current-password' : 'new-password';
  hideAuthMessages();
}

function hideAuthMessages() {
  document.getElementById('setup-error').style.display = 'none';
  document.getElementById('setup-success').style.display = 'none';
}

function showAuthError(msg) {
  const el = document.getElementById('setup-error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('setup-success').style.display = 'none';
}

function showAuthSuccess(msg) {
  const el = document.getElementById('setup-success');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('setup-error').style.display = 'none';
}

async function handleAuthSubmit() {
  hideAuthMessages();
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;

  if (!email || !password) {
    showAuthError('Email and password are required.');
    return;
  }

  const btn = document.getElementById('auth-submit-btn');
  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = '…';

  try {
    if (authMode === 'signin') {
      const { data, error } = await db.auth.signInWithPassword({ email, password });
      if (error) throw error;
      await onAuthSuccess(data.user);
    } else {
      const { data, error } = await db.auth.signUp({ email, password });
      if (error) throw error;
      if (data.session) {
        // Email confirmation disabled in project settings — logged in immediately
        await onAuthSuccess(data.user);
      } else {
        showAuthSuccess('Account created! Check your email to confirm, then sign in.');
        setAuthMode('signin');
      }
    }
  } catch (e) {
    showAuthError(e.message || 'Authentication failed.');
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

async function handleMagicLink() {
  hideAuthMessages();
  const email = document.getElementById('auth-email').value.trim();
  if (!email) {
    showAuthError('Enter your email above first.');
    return;
  }

  const btn = document.getElementById('auth-magic-btn');
  btn.disabled = true;
  try {
    const { error } = await db.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    if (error) throw error;
    showAuthSuccess('Magic link sent! Check your email and click the link to sign in.');
  } catch (e) {
    showAuthError(e.message || 'Could not send magic link.');
  } finally {
    btn.disabled = false;
  }
}

async function handleLogout() {
  if (!confirm('Sign out of Marquee?')) return;
  await db.auth.signOut();
  currentUser = null;
  trackedShows = [];
  activeAlerts = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
}

// ─── TMDB HELPERS ─────────────────────────────────────────────────────────────
async function tmdbFetch(path) {
  const res = await fetch(`${TMDB_BASE}${path}`, {
    headers: { Authorization: `Bearer ${TMDB_TOKEN}`, 'Content-Type': 'application/json' }
  });
  if (!res.ok) {
    const body = await res.text().catch(() => '');
    throw new Error(`TMDB ${res.status}: ${body}`);
  }
  return res.json();
}

async function tmdbSearch(query) {
  return tmdbFetch(`/search/tv?query=${encodeURIComponent(query)}&language=en-US&page=1`);
}

async function tmdbShowDetail(id) {
  return tmdbFetch(`/tv/${id}?language=en-US`);
}

async function tmdbSeason(showId, seasonNum) {
  return tmdbFetch(`/tv/${showId}/season/${seasonNum}?language=en-US`);
}

async function tmdbProviders(showId) {
  return tmdbFetch(`/tv/${showId}/watch/providers`);
}

async function tmdbSimilar(showId) {
  return tmdbFetch(`/tv/${showId}/similar?language=en-US&page=1`);
}

// ─── DATA LOADING ─────────────────────────────────────────────────────────────
async function loadAllShows() {
  const { data, error } = await db.from('tracked_shows').select('*').order('created_at', { ascending: false });
  if (error) { console.error(error); return; }

  // Fetch TMDB details for each
  trackedShows = await Promise.all((data || []).map(async row => {
    try {
      const tmdb = await tmdbShowDetail(row.tmdb_id);
      return { ...row, tmdb };
    } catch (e) {
      console.warn(`Failed to load TMDB data for show ${row.tmdb_id}:`, e);
      return { ...row, tmdb: null };
    }
  }));
}

async function getEpisodeProgress(tmdbShowId) {
  const { data } = await db.from('episode_progress')
    .select('*')
    .eq('tmdb_show_id', tmdbShowId);
  return data || [];
}

// ─── AGGREGATE PROGRESS (for list views & "Unwatched" sub-tab) ────────────────
// Computes watched/total aired-episode counts per show using a single batched
// query against episode_progress, combined with each show's season data
// (already cached on tmdb.seasons) to determine how many episodes have aired.
async function refreshShowProgressCache() {
  const showIds = trackedShows.filter(s => s.tmdb).map(s => s.tmdb_id);
  if (!showIds.length) return;

  const { data: allProgress } = await db.from('episode_progress')
    .select('*')
    .in('tmdb_show_id', showIds)
    .eq('watched', true);

  const watchedByShow = {};
  (allProgress || []).forEach(p => {
    watchedByShow[p.tmdb_show_id] = (watchedByShow[p.tmdb_show_id] || 0) + 1;
  });

  const today = new Date();
  for (const show of trackedShows) {
    if (!show.tmdb) continue;
    const t = show.tmdb;
    // Approximate "aired episodes" using last_episode_to_air's air_date cutoff
    // combined with number_of_episodes as an upper bound. This avoids fetching
    // every season for every show just to render list badges.
    let total = 0;
    if (t.last_episode_to_air?.air_date && new Date(t.last_episode_to_air.air_date) <= today) {
      total = t.last_episode_to_air.episode_number != null
        ? estimateAiredTotal(t)
        : (t.number_of_episodes || 0);
    } else {
      total = t.number_of_episodes || 0;
    }
    const watched = watchedByShow[t.id] || 0;
    const pct = total > 0 ? Math.min(100, Math.round((watched / total) * 100)) : 0;
    showProgressCache[t.id] = { watched, total, pct, unwatched: Math.max(0, total - watched) };
  }
}

// Sums episode counts of all seasons up to and including the season containing
// the last aired episode, using TMDB's per-season episode_count field.
function estimateAiredTotal(tmdb) {
  const lastSeasonNum = tmdb.last_episode_to_air?.season_number;
  const lastEpNum = tmdb.last_episode_to_air?.episode_number || 0;
  if (lastSeasonNum == null) return tmdb.number_of_episodes || 0;

  const seasons = (tmdb.seasons || []).filter(s => s.season_number > 0 && s.season_number < lastSeasonNum);
  const priorSeasonsTotal = seasons.reduce((sum, s) => sum + (s.episode_count || 0), 0);
  return priorSeasonsTotal + lastEpNum;
}

// ─── ALERTS ENGINE ────────────────────────────────────────────────────────────
// Compares each tracked show's current TMDB state against its last-known snapshot
// (stored in show_snapshots) and writes new rows into the `alerts` table whenever
// something notification-worthy changed. Snapshots are then updated to current state.
async function detectAndStoreAlerts() {
  const showsWithData = trackedShows.filter(s => s.tmdb && s.status !== 'completed');
  if (!showsWithData.length) return;

  const { data: snapshots } = await db.from('show_snapshots').select('*');
  const snapMap = new Map((snapshots || []).map(s => [s.tmdb_show_id, s]));

  const newAlerts = [];
  const snapshotUpserts = [];
  const today = new Date();

  for (const show of showsWithData) {
    const t = show.tmdb;
    const id = t.id;
    const prev = snapMap.get(id);
    const nextAirDate = t.next_episode_to_air?.air_date || null;
    const nextEpSeason = t.next_episode_to_air?.season_number ?? null;
    const nextEpNumber = t.next_episode_to_air?.episode_number ?? null;

    if (prev) {
      // 1. New season date announced (didn't have a next air date before, now does)
      if (!prev.next_air_date && nextAirDate) {
        newAlerts.push({
          tmdb_show_id: id,
          alert_type: 'season_date_announced',
          message: `New episode date announced: S${nextEpSeason}E${nextEpNumber} airs ${formatDate(nextAirDate)}`,
          alert_key: `season_date:${id}:${nextEpSeason}:${nextEpNumber}:${nextAirDate}`
        });
      }

      // 2. A new season number appeared (season count increased)
      if (prev.number_of_seasons != null && t.number_of_seasons > prev.number_of_seasons) {
        newAlerts.push({
          tmdb_show_id: id,
          alert_type: 'new_season_added',
          message: `Season ${t.number_of_seasons} has been added`,
          alert_key: `new_season:${id}:${t.number_of_seasons}`
        });
      }

      // 3. Status changed (e.g. In Production -> Returning Series -> Ended/Canceled)
      if (prev.status && prev.status !== t.status) {
        if (t.status === 'Canceled') {
          newAlerts.push({
            tmdb_show_id: id, alert_type: 'cancelled',
            message: `This show has been cancelled.`,
            alert_key: `status:${id}:Canceled`
          });
        } else if (t.status === 'Ended') {
          newAlerts.push({
            tmdb_show_id: id, alert_type: 'ended',
            message: `This show has ended after ${t.number_of_seasons} season${t.number_of_seasons !== 1 ? 's' : ''}.`,
            alert_key: `status:${id}:Ended`
          });
        } else if (t.status === 'Returning Series' && prev.status === 'In Production') {
          newAlerts.push({
            tmdb_show_id: id, alert_type: 'status_changed',
            message: `Confirmed returning for a new season`,
            alert_key: `status:${id}:Returning`
          });
        } else if (t.status === 'In Production' && (prev.status === 'Returning Series' || prev.status === 'Planned')) {
          newAlerts.push({
            tmdb_show_id: id, alert_type: 'status_changed',
            message: `Now in production for a new season`,
            alert_key: `status:${id}:InProduction`
          });
        }
      }

    } else {
      // First time we've ever seen this show — no alert, just seed the snapshot.
    }

    // 5. Premiere today/passed check independent of prev existing: if next_episode_to_air is ep 1 of a season and date is today
    if (nextAirDate && nextEpNumber === 1 && nextAirDate === today.toISOString().slice(0,10)) {
      newAlerts.push({
        tmdb_show_id: id,
        alert_type: 'season_premiered',
        message: `Season ${nextEpSeason} premieres today!`,
        alert_key: `premiere_today:${id}:${nextEpSeason}:${nextAirDate}`
      });
    }

    snapshotUpserts.push({
      tmdb_show_id: id,
      status: t.status,
      next_air_date: nextAirDate,
      number_of_seasons: t.number_of_seasons,
      updated_at: new Date().toISOString()
    });
  }

  if (newAlerts.length) {
    // Use upsert with ignoreDuplicates-like behavior via unique (user_id, alert_key) constraint.
    // onConflict prevents duplicate alerts for the same event.
    const stampedAlerts = newAlerts.map(a => ({ ...a, user_id: currentUser.id }));
    await db.from('alerts').upsert(stampedAlerts, { onConflict: 'user_id,alert_key', ignoreDuplicates: true });
  }
  if (snapshotUpserts.length) {
    const stampedSnapshots = snapshotUpserts.map(s => ({ ...s, user_id: currentUser.id }));
    await db.from('show_snapshots').upsert(stampedSnapshots, { onConflict: 'user_id,tmdb_show_id' });
  }
}

async function loadActiveAlerts() {
  const { data } = await db.from('alerts')
    .select('*')
    .eq('dismissed', false)
    .order('created_at', { ascending: false });
  activeAlerts = data || [];
}

async function dismissAlert(alertId, rowEl) {
  if (rowEl) rowEl.classList.add('dismissing');
  await db.from('alerts').update({ dismissed: true }).eq('id', alertId).eq('user_id', currentUser.id);
  activeAlerts = activeAlerts.filter(a => a.id !== alertId);
  updateAlertBell();
  setTimeout(() => { if (currentTab === 'alerts') renderTab(); }, 200);
}

async function dismissAllInSection(alertIds) {
  if (!alertIds.length) return;
  await db.from('alerts').update({ dismissed: true }).in('id', alertIds).eq('user_id', currentUser.id);
  activeAlerts = activeAlerts.filter(a => !alertIds.includes(a.id));
  updateAlertBell();
  renderTab();
}

function updateAlertBell() {
  const dot = document.getElementById('alert-dot');
  if (!dot) return;
  dot.classList.toggle('show', activeAlerts.length > 0);
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function setupSearch() {
  const input = document.getElementById('search-input');
  const dropdown = document.getElementById('search-dropdown');

  input.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    const q = input.value.trim();
    if (!q) { dropdown.classList.remove('open'); return; }
    dropdown.classList.add('open');
    document.getElementById('search-loading').style.display = 'flex';
    document.getElementById('search-results').innerHTML = '';
    searchDebounce = setTimeout(() => doSearch(q), 400);
  });

  input.addEventListener('focus', () => {
    if (input.value.trim()) dropdown.classList.add('open');
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.topbar-search')) dropdown.classList.remove('open');
  });
}

async function doSearch(query) {
  try {
    const data = await tmdbSearch(query);
    document.getElementById('search-loading').style.display = 'none';
    const results = (data.results || []).slice(0, 8);
    const container = document.getElementById('search-results');
    if (!results.length) {
      container.innerHTML = '<div class="search-empty">No shows found</div>';
      return;
    }
    container.innerHTML = results.map(show => {
      const tracked = trackedShows.find(s => s.tmdb_id === show.id);
      const poster = show.poster_path ? `<img class="search-poster-thumb" src="${TMDB_IMG}/w92${show.poster_path}" alt="" />` : `<div class="search-poster-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem;">📺</div>`;
      return `
        <div class="search-result-item" onclick="openDetailById(${show.id})">
          ${poster}
          <div class="search-result-info">
            <div class="search-result-title">${esc(show.name)}</div>
            <div class="search-result-meta">${show.first_air_date ? show.first_air_date.slice(0,4) : '—'} · ⭐ ${show.vote_average?.toFixed(1) || '?'}</div>
          </div>
          ${tracked
            ? `<span class="search-result-add tracked">✓ Tracked</span>`
            : `<button class="search-result-add" onclick="event.stopPropagation();addShow(${show.id},'watching',this)">+ Add</button>`}
        </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('search-loading').style.display = 'none';
    document.getElementById('search-results').innerHTML = '<div class="search-empty">Search failed. Check your TMDB token.</div>';
  }
}

// ─── ADD / REMOVE SHOW ────────────────────────────────────────────────────────
async function addShow(tmdbId, status = 'watching', btn = null) {
  if (btn) { btn.textContent = '…'; btn.disabled = true; }
  try {
    const { error } = await db.from('tracked_shows')
      .upsert({ tmdb_id: tmdbId, status, user_id: currentUser.id }, { onConflict: 'user_id,tmdb_id' });
    if (error) throw error;
    await loadAllShows();
    await refreshShowProgressCache();
    await detectAndStoreAlerts();
    await loadActiveAlerts();
    updateAlertBell();
    renderTab();
    toast('Show added to your list ✓');
    if (btn) { btn.textContent = '✓ Tracked'; btn.className = 'search-result-add tracked'; btn.disabled = false; }
  } catch (e) {
    toast('Failed to add show', true);
    if (btn) { btn.textContent = '+ Add'; btn.disabled = false; }
  }
}

async function updateShowStatus(tmdbId, status) {
  await db.from('tracked_shows').update({ status }).eq('tmdb_id', tmdbId).eq('user_id', currentUser.id);
  const show = trackedShows.find(s => s.tmdb_id === tmdbId);
  if (show) show.status = status;
  renderTab();
  toast(`Moved to ${statusLabel(status)}`);
}

async function removeShow(tmdbId) {
  const uid = currentUser.id;
  await db.from('tracked_shows').delete().eq('tmdb_id', tmdbId).eq('user_id', uid);
  await db.from('episode_progress').delete().eq('tmdb_show_id', tmdbId).eq('user_id', uid);
  await db.from('alerts').delete().eq('tmdb_show_id', tmdbId).eq('user_id', uid);
  await db.from('show_snapshots').delete().eq('tmdb_show_id', tmdbId).eq('user_id', uid);
  trackedShows = trackedShows.filter(s => s.tmdb_id !== tmdbId);
  activeAlerts = activeAlerts.filter(a => a.tmdb_show_id !== tmdbId);
  updateAlertBell();
  closeDetailPanel();
  renderTab();
  toast('Show removed');
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const tabs = ['watching','watchlist','completed','calendar','alerts'];
    btn.classList.toggle('active', tabs[i] === tab);
  });
  renderTab();
}

function renderTab() {
  const el = document.getElementById('main-content');
  if (currentTab === 'alerts') {
    renderAlerts(el);
  } else if (currentTab === 'calendar') {
    renderCalendar(el);
  } else {
    renderShowsTab(el);
  }
}

// ─── RENDER SHOWS TAB ─────────────────────────────────────────────────────────
function renderShowsTab(container) {
  let filtered = trackedShows.filter(s => s.status === currentTab);
  const labels = { watching: 'Currently Watching', watchlist: 'Want to Watch', completed: 'Completed' };

  const showSubTabs = currentTab === 'watching';
  if (showSubTabs && watchingSubView === 'unwatched') {
    filtered = filtered.filter(s => (getLocalProgress(s).unwatched || 0) > 0);
  }

  container.innerHTML = `
    <div class="section-header">
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <span class="section-title">${labels[currentTab]}</span>
        <span class="section-count">${filtered.length}</span>
      </div>
      <div class="view-toggle">
        <button class="view-btn ${currentView === 'grid' ? 'active' : ''}" onclick="setView('grid')" title="Grid">⊞</button>
        <button class="view-btn ${currentView === 'list' ? 'active' : ''}" onclick="setView('list')" title="List">≡</button>
      </div>
    </div>
    ${showSubTabs ? `
    <div class="filters-bar">
      <button class="filter-chip ${watchingSubView === 'all' ? 'active' : ''}" onclick="setWatchingSubView('all')">All Shows</button>
      <button class="filter-chip ${watchingSubView === 'unwatched' ? 'active' : ''}" onclick="setWatchingSubView('unwatched')">Unwatched Episodes</button>
    </div>` : ''}`;

  if (!filtered.length) {
    const emptyMsg = (showSubTabs && watchingSubView === 'unwatched')
      ? `<div class="empty-state"><div class="icon">🎉</div><h3>All caught up!</h3><p>No unwatched episodes across your watching list.</p></div>`
      : `<div class="empty-state"><div class="icon">📺</div><h3>Nothing here yet</h3><p>Search for a show above and add it to your ${labels[currentTab].toLowerCase()} list.</p></div>`;
    container.innerHTML += emptyMsg;
    return;
  }

  if (currentView === 'grid') {
    container.innerHTML += `<div class="shows-grid">${filtered.map(showCard).join('')}</div>`;
  } else {
    container.innerHTML += `<div class="shows-list">${filtered.map(showListRow).join('')}</div>`;
  }
}

function setWatchingSubView(v) {
  watchingSubView = v;
  renderTab();
}

function setView(v) {
  currentView = v;
  renderTab();
}

function showCard(show) {
  if (!show.tmdb) return '';
  const t = show.tmdb;
  const poster = t.poster_path
    ? `<img class="show-card-poster" src="${TMDB_IMG}/w342${t.poster_path}" alt="${esc(t.name)}" loading="lazy" />`
    : `<div class="show-card-poster-placeholder">📺</div>`;
  const badge = statusBadge(t.status);
  const progress = getLocalProgress(show);
  const alertLabel = getUpcomingAlert(t);

  return `
    <div class="show-card" onclick="openDetailById(${t.id})">
      ${alertLabel ? `<div class="card-alert-badge">🔔 ${alertLabel}</div>` : ''}
      ${progress.pct >= 100 ? `<div class="card-watched-overlay">✓</div>` : ''}
      ${poster}
      <div class="show-card-body">
        <div class="show-card-title">${esc(t.name)}</div>
        <div class="show-card-meta">
          ${badge}
          <span>${t.first_air_date?.slice(0,4) || '—'}</span>
          ${watchingSubView === 'unwatched' && progress.unwatched > 0 ? `<span style="color:var(--amber);font-weight:600;">${progress.unwatched} new</span>` : ''}
        </div>
        ${progress.total > 0 ? `
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${progress.pct}%"></div>
        </div>` : ''}
      </div>
    </div>`;
}

function showListRow(show) {
  if (!show.tmdb) return '';
  const t = show.tmdb;
  const poster = t.poster_path ? `<img class="list-poster" src="${TMDB_IMG}/w92${t.poster_path}" alt="" />` : `<div class="list-poster" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem;">📺</div>`;
  const progress = getLocalProgress(show);
  return `
    <div class="list-show-row" onclick="openDetailById(${t.id})">
      ${poster}
      <div class="list-info">
        <div class="list-title">${esc(t.name)}</div>
        <div class="list-meta">${statusBadge(t.status)} · ${t.first_air_date?.slice(0,4) || '—'}</div>
      </div>
      ${progress.total > 0 ? `
      <div class="list-progress">
        <div class="list-progress-text">${progress.watched}/${progress.total} eps</div>
        <div class="list-pbar"><div class="list-pbar-fill" style="width:${progress.pct}%"></div></div>
      </div>` : ''}
    </div>`;
}

function getLocalProgress(show) {
  const cached = showProgressCache[show.tmdb_id];
  if (cached) return cached;
  const total = show.tmdb?.number_of_episodes || 0;
  return { total, watched: 0, pct: 0, unwatched: total };
}

// ─── ALERTS TAB ───────────────────────────────────────────────────────────────
function renderAlerts(container) {
  const shows = trackedShows.filter(s => s.tmdb && s.status !== 'completed');

  const upcoming = shows.filter(s => getUpcomingAlert(s.tmdb));
  const cancelled = shows.filter(s => ['Canceled','Ended'].includes(s.tmdb?.status));
  const returning = shows.filter(s => s.tmdb?.status === 'Returning Series');

  container.innerHTML = `
    <div class="section-header"><span class="section-title">Alerts & Updates</span></div>
    ${(!shows.length && !activeAlerts.length) ? `<div class="empty-state"><div class="icon">🔔</div><h3>No alerts</h3><p>Add shows to see upcoming air dates and status changes.</p></div>` : ''}`;

  // Notification feed — dismissible, persisted events (new season dates, status changes, etc.)
  if (activeAlerts.length) {
    const allIds = activeAlerts.map(a => a.id);
    container.innerHTML += `<div style="margin-bottom:1.5rem;">
      <div class="alerts-section-head">
        <span class="seasons-label">🔔 Notifications</span>
        <button class="clear-section-btn" onclick="dismissAllInSection(${JSON.stringify(allIds)})">Dismiss all</button>
      </div>
      <div class="alerts-list">
        ${activeAlerts.map(a => notificationRow(a)).join('')}
      </div></div>`;
  }

  if (upcoming.length) {
    container.innerHTML += `<div style="margin-bottom:1.5rem;">
      <div class="seasons-label" style="margin-bottom:0.75rem;">📅 Upcoming Episodes / Seasons</div>
      <div class="alerts-list">
        ${upcoming.map(s => alertRow(s, 'upcoming')).join('')}
      </div></div>`;
  }

  if (cancelled.length) {
    container.innerHTML += `<div style="margin-bottom:1.5rem;">
      <div class="seasons-label" style="margin-bottom:0.75rem;">🚫 Cancelled or Ended</div>
      <div class="alerts-list">
        ${cancelled.map(s => alertRow(s, 'ended')).join('')}
      </div></div>`;
  }

  if (returning.length) {
    container.innerHTML += `<div style="margin-bottom:1.5rem;">
      <div class="seasons-label" style="margin-bottom:0.75rem;">✅ Currently Returning</div>
      <div class="alerts-list">
        ${returning.map(s => alertRow(s, 'returning')).join('')}
      </div></div>`;
  }
}

function notificationRow(alert) {
  const show = trackedShows.find(s => s.tmdb_id === alert.tmdb_show_id);
  const t = show?.tmdb;
  const poster = t?.poster_path ? `<img class="alert-poster" src="${TMDB_IMG}/w92${t.poster_path}" alt="" />` : `<div class="alert-poster" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem;">📺</div>`;
  const icon = {
    season_date_announced: '📅',
    new_season_added: '🆕',
    cancelled: '🚫',
    ended: '🏁',
    status_changed: '🔄',
    season_premiered: '🎬'
  }[alert.alert_type] || '🔔';

  return `
    <div class="alert-row amber-alert" id="notif-${alert.id}" onclick="openDetailById(${alert.tmdb_show_id})">
      ${poster}
      <div class="alert-info">
        <div class="alert-show-title">${icon} ${esc(t?.name || 'Unknown Show')}</div>
        <div class="alert-text">${esc(alert.message)}</div>
      </div>
      <button class="alert-dismiss" onclick="event.stopPropagation();dismissAlert(${alert.id}, document.getElementById('notif-${alert.id}'))" title="Dismiss">✕</button>
    </div>`;
}

function alertRow(show, type) {
  const t = show.tmdb;
  const poster = t.poster_path ? `<img class="alert-poster" src="${TMDB_IMG}/w92${t.poster_path}" alt="" />` : `<div class="alert-poster" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem;">📺</div>`;
  const alertTxt = type === 'upcoming'
    ? getUpcomingAlertText(t)
    : type === 'ended'
    ? (t.status === 'Canceled' ? 'This show has been cancelled.' : `Ended after ${t.number_of_seasons} season${t.number_of_seasons !== 1 ? 's' : ''}.`)
    : `Returning Series · Season ${t.number_of_seasons} current`;

  const dateStr = type === 'upcoming' ? getNextAirDate(t) : '';

  return `
    <div class="alert-row ${type === 'upcoming' ? 'amber-alert' : ''}" onclick="openDetailById(${t.id})">
      ${poster}
      <div class="alert-info">
        <div class="alert-show-title">${esc(t.name)}</div>
        <div class="alert-text">${alertTxt}</div>
      </div>
      ${dateStr ? `<div class="alert-date">${dateStr}</div>` : ''}
    </div>`;
}

function getUpcomingAlert(tmdb) {
  if (!tmdb) return null;
  const next = tmdb.next_episode_to_air;
  if (!next) return null;
  const d = new Date(next.air_date);
  const now = new Date();
  const diff = Math.ceil((d - now) / (1000 * 60 * 60 * 24));
  if (diff < 0) return null;
  if (diff === 0) return 'Today!';
  if (diff <= 7) return `${diff}d`;
  if (diff <= 30) return `${Math.ceil(diff/7)}w`;
  return null;
}

function getUpcomingAlertText(tmdb) {
  const next = tmdb.next_episode_to_air;
  if (!next) return '';
  return `S${next.season_number}E${next.episode_number}: "${next.name}" airs ${formatDate(next.air_date)}`;
}

function getNextAirDate(tmdb) {
  const next = tmdb?.next_episode_to_air;
  if (!next) return '';
  return formatDate(next.air_date);
}

// ─── CALENDAR TAB ─────────────────────────────────────────────────────────────
async function renderCalendar(container) {
  const monthKey = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}`;
  const monthLabel = new Date(calendarYear, calendarMonth, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  container.innerHTML = `
    <div class="section-header"><span class="section-title">Episode Calendar</span></div>
    <div class="calendar-nav">
      <button class="calendar-nav-btn" onclick="navigateCalendar(-1)" title="Previous month">‹</button>
      <span class="calendar-month-label">${monthLabel}</span>
      <button class="calendar-nav-btn" onclick="navigateCalendar(1)" title="Next month">›</button>
      <button class="btn btn-ghost calendar-today-btn" onclick="goToCurrentMonth()">Today</button>
    </div>
    <div id="calendar-body"><div style="display:flex;justify-content:center;padding:2rem;"><div class="spinner"></div></div></div>
    <div class="calendar-legend">
      <span><span class="calendar-legend-dot" style="background:var(--amber-dim);border:1px solid var(--amber-glow);"></span>Upcoming episode</span>
      <span><span class="calendar-legend-dot" style="background:var(--bg3);border:1px solid var(--border);"></span>Aired</span>
    </div>`;

  const episodes = await getEpisodesForMonth(calendarYear, calendarMonth);
  renderCalendarGrid(episodes);
}

async function getEpisodesForMonth(year, month) {
  const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
  if (calendarEpisodeCache[monthKey]) return calendarEpisodeCache[monthKey];

  const monthStart = new Date(year, month, 1);
  const monthEnd = new Date(year, month + 1, 0);

  const showsWithData = trackedShows.filter(s => s.tmdb);
  const results = [];

  // For each show, figure out which season(s) could have episodes in this visible month.
  // We use first_air_date/last_air_date per season to avoid fetching irrelevant seasons.
  await Promise.all(showsWithData.map(async show => {
    const t = show.tmdb;
    const seasons = (t.seasons || []).filter(s => s.season_number > 0);

    for (const s of seasons) {
      // Quick filter: skip seasons clearly outside this month using season air_date as a hint,
      // but TMDB only gives season-level air_date (premiere date), so we still need to check
      // seasons whose premiere is on/before month end and could plausibly still be airing,
      // OR whose premiere falls within or after this month.
      if (s.air_date) {
        const seasonStart = new Date(s.air_date);
        // If season started more than ~10 months before this visible month, it's almost
        // certainly fully aired already and irrelevant — skip fetching it to save calls.
        const monthsDiff = (monthStart.getFullYear() - seasonStart.getFullYear()) * 12 + (monthStart.getMonth() - seasonStart.getMonth());
        if (monthsDiff > 10) continue;
      }

      try {
        const seasonData = await tmdbSeason(t.id, s.season_number);
        for (const ep of (seasonData.episodes || [])) {
          if (!ep.air_date) continue;
          const epDate = new Date(ep.air_date + 'T00:00:00');
          if (epDate >= monthStart && epDate <= monthEnd) {
            results.push({
              date: ep.air_date,
              showId: t.id,
              showName: t.name,
              poster: t.poster_path,
              season: s.season_number,
              episode: ep.episode_number,
              name: ep.name
            });
          }
        }
      } catch (e) { /* skip season on error */ }
    }
  }));

  calendarEpisodeCache[monthKey] = results;
  return results;
}

function renderCalendarGrid(episodes) {
  const body = document.getElementById('calendar-body');
  if (!body) return;

  const firstOfMonth = new Date(calendarYear, calendarMonth, 1);
  const startWeekday = firstOfMonth.getDay(); // 0=Sun
  const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
  const today = new Date();
  const todayKey = today.toISOString().slice(0,10);

  const epsByDay = {};
  episodes.forEach(ep => {
    (epsByDay[ep.date] = epsByDay[ep.date] || []).push(ep);
  });

  const weekdayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = `<div class="calendar-grid">`;
  html += weekdayLabels.map(d => `<div class="calendar-weekday">${d}</div>`).join('');

  for (let i = 0; i < startWeekday; i++) {
    html += `<div class="calendar-cell empty"></div>`;
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateKey = `${calendarYear}-${String(calendarMonth + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = dateKey === todayKey;
    const dayEps = (epsByDay[dateKey] || []).sort((a,b) => a.showName.localeCompare(b.showName));
    const isPast = new Date(dateKey + 'T00:00:00') < new Date(todayKey + 'T00:00:00');

    const visibleEps = dayEps.slice(0, 3);
    const extra = dayEps.length - visibleEps.length;

    html += `
      <div class="calendar-cell ${isToday ? 'today' : ''}">
        <span class="calendar-date-num">${day}</span>
        ${visibleEps.map(ep => `
          <div class="calendar-ep-chip ${isPast ? 'past' : ''}" onclick="openDetailById(${ep.showId})" title="${esc(ep.showName)} S${ep.season}E${ep.episode}: ${esc(ep.name)}">
            ${esc(ep.showName)} S${ep.season}E${ep.episode}
          </div>`).join('')}
        ${extra > 0 ? `<div class="calendar-more-chip">+${extra} more</div>` : ''}
      </div>`;
  }

  const totalCells = startWeekday + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for (let i = 0; i < trailing; i++) {
    html += `<div class="calendar-cell empty"></div>`;
  }

  html += `</div>`;
  body.innerHTML = html;
}

function navigateCalendar(delta) {
  calendarMonth += delta;
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
  renderCalendar(document.getElementById('main-content'));
}

function goToCurrentMonth() {
  calendarMonth = new Date().getMonth();
  calendarYear = new Date().getFullYear();
  renderCalendar(document.getElementById('main-content'));
}

// ─── DETAIL PANEL ─────────────────────────────────────────────────────────────
async function openDetailById(tmdbId) {
  activeDetailId = tmdbId;
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-backdrop').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;"><div class="spinner"></div></div>`;
  document.getElementById('detail-body').innerHTML = `<div style="padding:2rem;display:flex;justify-content:center;"><div class="spinner"></div></div>`;

  try {
    let show = trackedShows.find(s => Number(s.tmdb_id) === Number(tmdbId));
    let tmdb = show?.tmdb;
    if (!tmdb) tmdb = await tmdbShowDetail(tmdbId);

    const [providers, similar, progress] = await Promise.all([
      tmdbProviders(tmdbId).catch(() => ({})),
      tmdbSimilar(tmdbId).catch(() => ({ results: [] })),
      show ? getEpisodeProgress(tmdbId) : Promise.resolve([])
    ]);

    renderDetailPanel(tmdb, show, providers, similar, progress);
  } catch (e) {
    console.error('openDetailById error:', e);
    document.getElementById('detail-body').innerHTML = `<div style="padding:2rem;color:var(--red);">Failed to load show details: ${esc(e.message)}</div>`;
  }
}

function renderDetailPanel(tmdb, show, providers, similar, epProgress) {
  // Backdrop
  const bd = document.getElementById('detail-backdrop');
  if (tmdb.backdrop_path) {
    bd.innerHTML = `<img src="${TMDB_IMG}/w1280${tmdb.backdrop_path}" alt="" />`;
  } else {
    bd.innerHTML = `<div class="detail-backdrop-placeholder">🎬</div>`;
  }

  const isTracked = !!show;

  // Providers
  const usProviders = providers?.results?.US?.flatrate || [];
  const streamingHtml = usProviders.length
    ? usProviders.map(p => `<div class="streaming-badge"><img src="${TMDB_IMG}/w45${p.logo_path}" alt="${esc(p.provider_name)}" />${esc(p.provider_name)}</div>`).join('')
    : '<span style="font-size:0.82rem;color:var(--text-muted);">No streaming info available (US)</span>';

  // Next episode alert
  const nextEp = tmdb.next_episode_to_air;
  const alertHtml = nextEp ? `
    <div class="alert-box">
      <span class="alert-icon">🔔</span>
      <div><strong>S${nextEp.season_number}E${nextEp.episode_number}: "${esc(nextEp.name)}"</strong> airs ${formatDate(nextEp.air_date)}</div>
    </div>` : '';

  // Cancelled/ended notice
  const statusNotice = (tmdb.status === 'Canceled')
    ? `<div class="alert-box" style="background:rgba(224,82,82,0.1);border-color:rgba(224,82,82,0.3);"><span class="alert-icon">🚫</span><div><strong style="color:var(--red);">This show has been cancelled.</strong></div></div>`
    : (tmdb.status === 'Ended')
    ? `<div class="alert-box" style="background:var(--bg3);border-color:var(--border);"><span class="alert-icon">🏁</span><div>This show has ended after <strong>${tmdb.number_of_seasons}</strong> season${tmdb.number_of_seasons !== 1 ? 's' : ''}.</div></div>`
    : '';

  // Rating
  const rating = tmdb.vote_average ? `⭐ ${tmdb.vote_average.toFixed(1)}/10` : '';

  // Genres
  const genres = (tmdb.genres || []).map(g => `<span style="background:var(--bg3);border:1px solid var(--border);padding:0.15rem 0.55rem;border-radius:50px;font-size:0.72rem;">${esc(g.name)}</span>`).join('');

  // Actions
  const statusOpts = ['watching','watchlist','completed'].map(s =>
    `<button class="btn btn-ghost" style="${show?.status === s ? 'border-color:var(--amber);color:var(--amber);' : ''}" onclick="updateShowStatus(${tmdb.id},'${s}')">${statusLabel(s)}</button>`
  ).join('');

  // Similar
  const simItems = (similar?.results || []).slice(0, 8).map(s => {
    const img = s.poster_path ? `<img class="suggestion-poster" src="${TMDB_IMG}/w185${s.poster_path}" alt="${esc(s.name)}" />` : `<div class="suggestion-poster" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;">📺</div>`;
    return `<div class="suggestion-card" onclick="openDetailById(${s.id})">${img}<div class="suggestion-title">${esc(s.name)}</div></div>`;
  }).join('');

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-header">
      ${tmdb.poster_path
        ? `<img class="detail-poster" src="${TMDB_IMG}/w185${tmdb.poster_path}" alt="${esc(tmdb.name)}" />`
        : `<div class="detail-poster-placeholder">📺</div>`}
      <div class="detail-info">
        <div class="detail-title">${esc(tmdb.name)}</div>
        <div class="detail-meta-row">
          ${statusBadge(tmdb.status)}
          ${rating ? `<span>${rating}</span>` : ''}
          ${tmdb.first_air_date ? `<span>${tmdb.first_air_date.slice(0,4)}</span>` : ''}
          ${tmdb.number_of_seasons ? `<span>${tmdb.number_of_seasons} Season${tmdb.number_of_seasons !== 1 ? 's' : ''}</span>` : ''}
          ${tmdb.number_of_episodes ? `<span>${tmdb.number_of_episodes} Episodes</span>` : ''}
        </div>
        <div style="display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.75rem;">${genres}</div>
        <div class="detail-actions">
          ${isTracked
            ? statusOpts + `<button class="btn btn-ghost" style="color:var(--red);border-color:rgba(224,82,82,0.3);" onclick="removeShow(${tmdb.id})">Remove</button>`
            : `<button class="btn btn-primary" style="width:auto;" onclick="addShow(${tmdb.id},'watching')">+ Add to Watching</button>
               <button class="btn btn-ghost" onclick="addShow(${tmdb.id},'watchlist')">Add to Watchlist</button>`}
        </div>
      </div>
    </div>

    ${alertHtml}
    ${statusNotice}

    <p class="detail-overview">${esc(tmdb.overview || 'No overview available.')}</p>

    <div style="margin-bottom:1.25rem;">
      <div class="seasons-label" style="margin-bottom:0.75rem;">📺 Where to Watch</div>
      <div class="streaming-row">${streamingHtml}</div>
    </div>

    ${isTracked ? `<div class="seasons-section" id="seasons-section-${tmdb.id}">
      <div class="seasons-header">
        <span class="seasons-label">📋 Seasons & Episodes</span>
        <button class="mark-season-btn" style="font-size:0.78rem;" onclick="toggleHideWatchedSeasons(${tmdb.id})" id="hide-watched-btn-${tmdb.id}">
          ${hideWatchedSeasonsMap[tmdb.id] ? '👁 Show Watched Seasons' : '🙈 Hide Watched Seasons'}
        </button>
      </div>
      <div id="seasons-accordions">
        <div style="display:flex;justify-content:center;padding:1rem;"><div class="spinner"></div></div>
      </div>
    </div>` : ''}

    ${simItems ? `<div style="margin-bottom:1.5rem;">
      <div class="seasons-label" style="margin-bottom:0.75rem;">🎬 You Might Also Like</div>
      <div class="suggestions-row">${simItems}</div>
    </div>` : ''}
  `;

  if (isTracked) {
    loadSeasonsForDetail(tmdb, epProgress);
  }
}

async function loadSeasonsForDetail(tmdb, epProgress) {
  const container = document.getElementById('seasons-accordions');
  if (!container) return;

  const seasons = (tmdb.seasons || []).filter(s => s.season_number > 0);
  const today = new Date();
  const hideWatched = !!hideWatchedSeasonsMap[tmdb.id];

  let html = '';
  let hiddenCount = 0;

  for (const s of seasons) {
    let seasonData;
    try {
      seasonData = await tmdbSeason(tmdb.id, s.season_number);
    } catch(e) { continue; }

    const eps = seasonData.episodes || [];
    const watchedEps = epProgress.filter(p => p.season_number === s.season_number && p.watched);
    const airableEps = eps.filter(e => e.air_date && new Date(e.air_date) <= today);
    const total = airableEps.length;
    const watched = watchedEps.length;
    const pct = total > 0 ? Math.round((watched / total) * 100) : 0;
    const isDone = total > 0 && watched >= total;
    const isPartial = watched > 0 && !isDone;

    if (hideWatched && isDone) {
      hiddenCount++;
      continue;
    }

    const seasonKey = `${tmdb.id}-${s.season_number}`;
    const isOpen = openSeasonIds.has(seasonKey);

    html += `
      <div class="season-accordion ${isOpen ? 'open' : ''}" id="season-${tmdb.id}-${s.season_number}">
        <div class="season-head" onclick="toggleSeason(${tmdb.id},${s.season_number})">
          <span class="season-chevron">▶</span>
          <span class="season-name">${esc(s.name)}</span>
          <span class="season-progress-text">${watched}/${total}</span>
          <div class="season-mini-progress">
            <div class="season-mini-fill ${isDone ? 'done' : ''}" style="width:${pct}%"></div>
          </div>
          <div class="season-check ${isDone ? 'done' : isPartial ? 'partial' : ''}">
            ${isDone ? '✓' : ''}
          </div>
          <button class="mark-season-btn" onclick="event.stopPropagation();markSeason(${tmdb.id},${s.season_number},${!isDone})" title="${isDone ? 'Unmark all' : 'Mark all watched'}">
            ${isDone ? '↩' : '✓ All'}
          </button>
        </div>
        <div class="season-episodes" id="eps-${tmdb.id}-${s.season_number}">
          ${eps.map(e => {
            const isFuture = !e.air_date || new Date(e.air_date) > today;
            const isWatched = epProgress.some(p => p.season_number === s.season_number && p.episode_number === e.episode_number && p.watched);
            return `
              <div class="episode-row ${isFuture ? 'ep-row-future' : ''}" onclick="${isFuture ? '' : `event.stopPropagation();toggleEpisode(${tmdb.id},${s.season_number},${e.episode_number})`}">
                <div class="ep-check ${isWatched ? 'watched' : ''}">${isWatched ? '✓' : ''}</div>
                <span class="ep-num">E${String(e.episode_number).padStart(2,'0')}</span>
                <span class="ep-name">${esc(e.name)}</span>
                <span class="ep-date">${e.air_date ? formatDate(e.air_date) : 'Upcoming'}</span>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  if (!html) {
    html = hideWatched && hiddenCount > 0
      ? `<div style="color:var(--text-muted);font-size:0.85rem;padding:0.5rem;">All ${hiddenCount} season${hiddenCount !== 1 ? 's' : ''} fully watched and hidden. Click "Show Watched Seasons" to view.</div>`
      : '<div style="color:var(--text-muted);font-size:0.85rem;padding:0.5rem;">No season data available.</div>';
  } else if (hideWatched && hiddenCount > 0) {
    html += `<div style="color:var(--text-muted);font-size:0.78rem;padding:0.5rem;">${hiddenCount} fully-watched season${hiddenCount !== 1 ? 's' : ''} hidden</div>`;
  }

  container.innerHTML = html;
}

function toggleHideWatchedSeasons(showId) {
  hideWatchedSeasonsMap[showId] = !hideWatchedSeasonsMap[showId];
  const btn = document.getElementById(`hide-watched-btn-${showId}`);
  if (btn) btn.textContent = hideWatchedSeasonsMap[showId] ? '👁 Show Watched Seasons' : '🙈 Hide Watched Seasons';

  const show = trackedShows.find(s => s.tmdb_id === showId);
  if (show?.tmdb) {
    getEpisodeProgress(showId).then(progress => loadSeasonsForDetail(show.tmdb, progress));
  }
}

function toggleSeason(showId, seasonNum) {
  const el = document.getElementById(`season-${showId}-${seasonNum}`);
  if (!el) return;
  const seasonKey = `${showId}-${seasonNum}`;
  const willOpen = !el.classList.contains('open');
  el.classList.toggle('open');
  if (willOpen) openSeasonIds.add(seasonKey);
  else openSeasonIds.delete(seasonKey);
}

async function toggleEpisode(showId, seasonNum, epNum) {
  const epProgress = await getEpisodeProgress(showId);
  const existing = epProgress.find(p => p.season_number === seasonNum && p.episode_number === epNum);
  const nowWatched = existing ? !existing.watched : true;

  await db.from('episode_progress').upsert({
    tmdb_show_id: showId,
    season_number: seasonNum,
    episode_number: epNum,
    watched: nowWatched,
    watched_at: nowWatched ? new Date().toISOString() : null,
    user_id: currentUser.id
  }, { onConflict: 'user_id,tmdb_show_id,season_number,episode_number' });

  // Refresh detail — open state is preserved via openSeasonIds
  const show = trackedShows.find(s => s.tmdb_id === showId);
  if (show?.tmdb) {
    const newProgress = await getEpisodeProgress(showId);
    loadSeasonsForDetail(show.tmdb, newProgress);
  }
  refreshShowProgressCache();
}

async function markSeason(showId, seasonNum, watched) {
  const tmdb = trackedShows.find(s => s.tmdb_id === showId)?.tmdb;
  if (!tmdb) return;

  const today = new Date();
  let seasonData;
  try { seasonData = await tmdbSeason(showId, seasonNum); } catch(e) { return; }
  const eps = (seasonData.episodes || []).filter(e => e.air_date && new Date(e.air_date) <= today);

  for (const ep of eps) {
    await db.from('episode_progress').upsert({
      tmdb_show_id: showId,
      season_number: seasonNum,
      episode_number: ep.episode_number,
      watched,
      watched_at: watched ? new Date().toISOString() : null,
      user_id: currentUser.id
    }, { onConflict: 'user_id,tmdb_show_id,season_number,episode_number' });
  }

  const newProgress = await getEpisodeProgress(showId);
  loadSeasonsForDetail(tmdb, newProgress);
  refreshShowProgressCache();
  toast(watched ? `Season ${seasonNum} marked as watched` : `Season ${seasonNum} unmarked`);
}

function closeDetailPanel() {
  document.getElementById('detail-overlay').classList.remove('open');
  activeDetailId = null;
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetailPanel();
}

function showSettings() {
  alert(`Signed in as: ${currentUser?.email || 'unknown'}\n\nMore settings coming soon. Use the 🚪 button to sign out.`);
}

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function statusBadge(status) {
  const map = {
    'Returning Series': ['badge-returning', '● Returning'],
    'Ended': ['badge-ended', '■ Ended'],
    'Canceled': ['badge-cancelled', '✕ Cancelled'],
    'In Production': ['badge-in-production', '◆ In Production'],
    'Planned': ['badge-upcoming', '◇ Planned'],
  };
  const [cls, label] = map[status] || ['badge-ended', status || ''];
  return `<span class="status-badge ${cls}">${label}</span>`;
}

function statusLabel(s) {
  return { watching: 'Watching', watchlist: 'Watchlist', completed: 'Completed' }[s] || s;
}

function formatDate(d) {
  if (!d) return '';
  const date = new Date(d + 'T00:00:00');
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, isError = false) {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  if (isError) el.style.borderColor = 'rgba(224,82,82,0.4)';
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
